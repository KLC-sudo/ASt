<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quaestor Favillae — CMS Control Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="/cms.js"></script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0E0D12;
            color: #F4F0E6;
            background-image: 
                radial-gradient(at 0% 0%, rgba(82, 71, 160, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(200, 160, 62, 0.08) 0px, transparent 50%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.02;
            z-index: 9999;
        }
        .glass-panel {
            background: rgba(21, 20, 28, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(244, 240, 230, 0.06);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(244, 240, 230, 0.04);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:focus-within {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(82, 71, 160, 0.4);
            box-shadow: 0 0 20px rgba(82, 71, 160, 0.1);
        }
        .tab-btn {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tab-btn.active {
            background: rgba(82, 71, 160, 0.15);
            border-color: rgba(82, 71, 160, 0.4);
            color: #F4F0E6;
            box-shadow: inset 0 0 12px rgba(82, 71, 160, 0.1);
        }
        .custom-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(244, 240, 230, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            color: #F4F0E6;
        }
        .custom-input:focus {
            border-color: #5247A0;
            box-shadow: 0 0 0 3px rgba(82, 71, 160, 0.2);
            outline: none;
            background: rgba(0, 0, 0, 0.3);
        }
        .glow-pulse {
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: pulse 2s infinite alternate;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #C8A03E;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 6px rgba(200, 160, 62, 0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #C8A03E;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 6px rgba(200, 160, 62, 0.4);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 6px rgba(34, 197, 94, 0.4); }
            100% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 14px rgba(34, 197, 94, 0.8); }
        }
        .toast {
            background: rgba(21, 20, 28, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 71, 160, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(82, 71, 160, 0.15);
            transform: translate(-50%, 40px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
        }
        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }
    </style>
    <script type="module" src="/cms.js"></script>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- Header / Top Bar -->
    <header class="glass-panel w-full max-w-7xl mx-auto rounded-2xl px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 z-10 shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center relative bg-white/5">
                <div class="w-5 h-5 rounded-full border border-mustard/60 flex items-center justify-center animate-[spin_10s_linear_infinite]">
                    <div class="w-1.5 h-1.5 rounded-full bg-mustard"></div>
                </div>
            </div>
            <div>
                <h1 class="text-base font-semibold tracking-wider text-offwhite uppercase">Quaestor Favillae</h1>
                <p class="text-[10px] tracking-[0.2em] uppercase text-white/40">CMS Control Deck v1.0</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-xs font-medium tracking-wide">
                <span class="w-2 h-2 rounded-full bg-green-500 glow-pulse"></span>
                STAGED ENGINE RUNNING
            </div>
            
            <a href="/" class="text-xs text-white/55 hover:text-mustard tracking-wider transition-colors duration-300 flex items-center gap-1.5 font-medium border border-white/10 px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10">
                VIEW LIVE SITE
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"></path>
                </svg>
            </a>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="w-full max-w-7xl mx-auto flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6 items-stretch mb-6">
        
        <!-- Sidebar: Tabs and quick actions -->
        <div class="lg:col-span-1 flex flex-col gap-4">
            
            <!-- Navigation Tabs list -->
            <div class="glass-panel p-4 rounded-2xl flex flex-col gap-1 shadow-md">
                <div class="text-[10px] tracking-[0.25em] uppercase text-white/30 px-3 pb-3 border-b border-white/5 mb-2 font-semibold">Sections</div>
                
                <button data-tab="branding" class="tab-btn active text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">🌐</span> Global & Branding
                </button>
                <button data-tab="hero" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">🎬</span> Hero & Orbit
                </button>
                <button data-tab="mission" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">📖</span> Mission & Vision
                </button>
                <button data-tab="gallery" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">🖼️</span> Flipbook Gallery
                </button>
                <button data-tab="values" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">💎</span> Core Values
                </button>
                <button data-tab="newsletter" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">✉️</span> Newsletter & Footer
                </button>
                <button data-tab="ticketing" class="tab-btn text-left px-4 py-3 rounded-xl border border-transparent text-sm font-medium text-white/60 hover:text-offwhite hover:bg-white/5 flex items-center gap-3">
                    <span class="text-base">🎟️</span> Ticketing
                </button>
            </div>

            <!-- Configuration Utilities Panel -->
            <div class="glass-panel p-4 rounded-2xl flex flex-col gap-3.5 shadow-md mt-auto">
                <div class="text-[10px] tracking-[0.25em] uppercase text-white/30 px-3 pb-3 border-b border-white/5 font-semibold">Utilities</div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-export" class="py-2.5 px-3 rounded-xl border border-white/10 bg-white/5 text-xs text-white/80 hover:bg-white/10 hover:text-offwhite transition-all flex items-center justify-center gap-1.5 font-medium uppercase tracking-wider">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"></path>
                        </svg>
                        Export
                    </button>
                    
                    <button id="btn-import-trigger" class="py-2.5 px-3 rounded-xl border border-white/10 bg-white/5 text-xs text-white/80 hover:bg-white/10 hover:text-offwhite transition-all flex items-center justify-center gap-1.5 font-medium uppercase tracking-wider">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"></path>
                        </svg>
                        Import
                    </button>
                </div>
                <input type="file" id="file-import" class="hidden" accept=".json">

                <button id="btn-reset" class="w-full py-3 rounded-xl border border-red-500/20 bg-red-500/10 text-xs text-red-400 hover:bg-red-500/20 transition-all flex items-center justify-center gap-1.5 font-semibold uppercase tracking-wider">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"></path>
                    </svg>
                    Reset to Defaults
                </button>
            </div>

        </div>

        <!-- Editor Pane -->
        <div class="lg:col-span-3 glass-panel rounded-2xl p-6 md:p-8 flex flex-col shadow-md relative min-h-[500px]">
            <form id="cms-editor-form" class="flex-1 flex flex-col justify-between">
                
                <!-- Variable fields dynamically populated based on active tab -->
                <div id="fields-container" class="space-y-6 flex-1">
                    <!-- Hydrated via Javascript -->
                </div>

                <!-- Footer Action Buttons -->
                <div class="mt-8 pt-6 border-t border-white/5 flex items-center justify-between gap-4">
                    <div class="text-[11px] text-white/30 tracking-wider font-light">
                        Changes are staged until saved to local state.
                    </div>
                    
                    <button type="submit" class="px-8 py-3.5 rounded-xl bg-bluepurple text-xs font-semibold uppercase tracking-wider text-offwhite hover:bg-bluepurple/80 hover:shadow-[0_0_20px_rgba(82,71,160,0.4)] transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"></path>
                        </svg>
                        Save & Apply Changes
                    </button>
                </div>
            </form>
        </div>

    </main>

    <!-- Global Floating Toast Notification -->
    <div id="cms-toast" class="toast fixed bottom-8 left-1/2 px-6 py-4 rounded-xl text-sm font-medium tracking-wide flex items-center gap-3 z-50">
        <span id="toast-icon" class="text-base">✨</span>
        <span id="toast-message" class="text-white/90">Configuration updated successfully.</span>
    </div>

</body>
</html>
